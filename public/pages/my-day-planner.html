<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY DAY — PLANNER</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Orbitron:wght@700;900&family=DM+Mono:wght@400;500&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:      #07090F;
  --p1:      #0C1018;
  --p2:      #111825;
  --p3:      #19243A;
  --border:  #1C2B40;
  --cyan:    #00E5FF;
  --lime:    #BFFF00;
  --hot:     #FF2D78;
  --text:    #D4EEFF;
  --dim:     #3E5870;
  --slot-h:  26px;
  --radius:  10px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ── Background ─────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    radial-gradient(ellipse 90% 55% at 50% -5%, rgba(0,229,255,0.06) 0%, transparent 70%),
    radial-gradient(circle at 1px 1px, rgba(0,229,255,0.035) 1px, transparent 0);
  background-size: 100% 100%, 30px 30px;
}

/* ── App shell ──────────────────────────────────────────── */
#app {
  position: relative; z-index: 1;
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 16px 24px;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
}

.logo {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 24px rgba(0,229,255,0.45);
  user-select: none;
}
.logo em { font-style: normal; color: var(--lime); }

/* ── Day tabs ────────────────────────────────────────────── */
.days {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.day-btn {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 7px 11px;
  background: var(--p1);
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all .18s;
  position: relative;
}
.day-btn:hover { color: var(--cyan); border-color: var(--cyan); }
.day-btn.active {
  background: var(--cyan);
  border-color: var(--cyan);
  color: #000;
  box-shadow: 0 0 14px rgba(0,229,255,0.4);
}
.day-btn .today-dot {
  position: absolute;
  top: 3px; right: 3px;
  width: 5px; height: 5px;
  background: var(--lime);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--lime);
}

/* ── Main layout ─────────────────────────────────────────── */
.main {
  display: grid;
  grid-template-columns: 1fr 160px;
  gap: 12px;
  align-items: start;
}

/* ── Panel shell ─────────────────────────────────────────── */
.panel {
  background: var(--p1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--p2);
}
.panel-head-left {
  display: flex; align-items: center; gap: 8px;
}
.panel-dot {
  width: 7px; height: 7px;
  border-radius: 2px;
  background: var(--lime);
  box-shadow: 0 0 7px var(--lime);
  flex-shrink: 0;
}
.panel-label {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text);
}
.clear-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--dim);
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 3px 9px;
  cursor: pointer;
  transition: all .15s;
  letter-spacing: 0.5px;
}
.clear-btn:hover { color: var(--hot); border-color: var(--hot); }

/* ── Time grid ───────────────────────────────────────────── */
.grid-wrap {
  height: 520px;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}
.grid-wrap::-webkit-scrollbar { width: 5px; }
.grid-wrap::-webkit-scrollbar-track { background: var(--p1); }
.grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.grid-wrap::-webkit-scrollbar-thumb:hover { background: var(--dim); }

.time-grid {
  display: grid;
  grid-template-columns: 68px 1fr;
}

/* ── Time labels ─────────────────────────────────────────── */
.t-labels { }
.t-label {
  height: var(--slot-h);
  display: flex;
  align-items: flex-start;
  justify-content: flex-end;
  padding: 3px 8px 0 0;
  font-family: 'DM Mono', monospace;
  font-size: 9.5px;
  color: transparent; /* half-hour labels invisible */
  border-right: 1px solid var(--border);
  white-space: nowrap;
}
.t-label.full-hour {
  color: var(--cyan);
  font-size: 9.5px;
  font-weight: 500;
}
.t-label.noon { color: var(--lime); }

/* ── Slots area ──────────────────────────────────────────── */
#slotsArea {
  position: relative;
}
.slot-row {
  height: var(--slot-h);
  border-bottom: 1px dashed rgba(30,43,64,0.45);
  transition: background .08s;
}
.slot-row.drag-over  { background: rgba(0,229,255,0.07) !important; }

/* Hour marker lines — rendered on top of blocks so always visible */
.hour-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: rgba(0,229,255,0.55);
  box-shadow: 0 0 4px rgba(0,229,255,0.3);
  z-index: 18;
  pointer-events: none;
}
.hour-line.noon {
  background: rgba(191,255,0,0.7);
  box-shadow: 0 0 5px rgba(191,255,0,0.35);
}

/* ── Empty state ─────────────────────────────────────────── */
.empty-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  opacity: 0.28;
  transition: opacity .3s;
}
.empty-hint span {
  display: block;
  font-size: 28px;
  margin-bottom: 6px;
}
.empty-hint p {
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cyan);
}

/* ── Drag ghost ──────────────────────────────────────────── */
#dragGhost {
  position: absolute;
  left: 3px; right: 3px;
  height: calc(var(--slot-h) * 2 - 2px);
  border: 2px dashed var(--cyan);
  border-radius: 7px;
  background: rgba(0,229,255,0.06);
  pointer-events: none;
  z-index: 5;
  display: none;
  transition: top .05s;
}

/* ── Placed blocks ───────────────────────────────────────── */
.placed-block {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 6px;
  padding: 7px 28px 8px 6px; /* top: room for top-resize handle; right: room for delete btn */
  cursor: default;
  overflow: hidden;
  z-index: 10;
  border: 1.5px solid rgba(255,255,255,0.12);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  transition: box-shadow .15s, opacity .15s;
}
.placed-block:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 20;
}
/* Glossy sheen */
.placed-block::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.14), transparent);
  border-radius: 6px 6px 0 0;
  pointer-events: none;
}

/* Top row: icon + name always side by side */
.blk-top {
  display: flex;
  align-items: center;
  gap: 4px;
  height: 24px; /* always visible, fits in a 26px slot */
  min-height: 24px;
  padding-top: 2px;
}
.blk-icon  { font-size: 12px; line-height: 1; flex-shrink: 0; }
.blk-name  {
  font-size: 11px;
  font-weight: 900;
  color: rgba(0,0,0,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
}
.blk-time  {
  font-family: 'DM Mono', monospace;
  font-size: 8.5px;
  color: rgba(0,0,0,0.55);
  padding-left: 2px;
  margin-top: 1px;
}

/* Delete ×  */
.blk-del {
  position: absolute;
  top: 2px; right: 3px;
  width: 15px; height: 15px;
  background: rgba(0,0,0,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 900;
  color: rgba(0,0,0,0.75);
  cursor: pointer;
  opacity: 0;
  transition: opacity .18s;
  z-index: 30;
  line-height: 1;
}
.placed-block:hover .blk-del { opacity: 1; }
.blk-del:hover { background: rgba(220,0,0,0.45); color: #fff; }

/* Resize handle (bottom — changes end time) */
.blk-resize {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 7px;
  cursor: ns-resize;
  background: rgba(0,0,0,0.22);
  border-radius: 0 0 6px 6px;
  display: flex; align-items: center; justify-content: center;
  z-index: 25;
}
.blk-resize::after {
  content: '⋯';
  font-size: 7px;
  color: rgba(0,0,0,0.4);
  line-height: 1;
}

/* Resize handle (top — changes start time) */
.blk-resize-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  cursor: ns-resize;
  background: rgba(0,0,0,0.18);
  border-radius: 6px 6px 0 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 25;
}
.blk-resize-top::after {
  content: '⋯';
  font-size: 7px;
  color: rgba(0,0,0,0.4);
  line-height: 1;
}

/* ── Activity palette ─────────────────────────────────────── */
.palette-panel {
  position: sticky;
  top: 20px;
}
.palette-scroll {
  max-height: 570px;
  overflow-y: auto;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.palette-scroll::-webkit-scrollbar { width: 4px; }
.palette-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.act-card {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  border-radius: 6px;
  cursor: grab;
  background: var(--p2);
  border: 1px solid transparent;
  transition: all .15s;
  user-select: none;
}
.act-card:hover {
  background: var(--p3);
  border-color: currentColor;
  transform: translateX(-2px);
  box-shadow: 2px 0 10px -4px currentColor;
}
.act-card:active { cursor: grabbing; opacity: 0.65; }
.act-card.is-dragging { opacity: 0.35; }

.act-swatch {
  width: 4px; height: 22px;
  border-radius: 2px;
  flex-shrink: 0;
}
.act-emoji { font-size: 15px; line-height: 1; }
.act-name  { font-size: 11px; font-weight: 800; flex: 1; }

/* ── Bottom bar ──────────────────────────────────────────── */
.bottom-bar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
}

.shot-btn {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, var(--lime) 0%, #80ff00 100%);
  color: #000;
  border: none;
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 2.5px;
  padding: 13px 32px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 22px rgba(191,255,0,0.28);
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.shot-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.18), transparent);
  pointer-events: none;
}
.shot-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 36px rgba(191,255,0,0.5);
}
.shot-btn:active { transform: translateY(0); }

.hint-text {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.5px;
  text-align: center;
}

/* ── Comic button ────────────────────────────────────────── */
.comic-btn {
  display: flex; align-items: center; gap: 10px;
  background: #CC1122;
  color: #fff;
  border: none;
  font-family: 'Bangers', 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: 3px;
  padding: 13px 32px;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 4px 4px 0 #000, 0 0 18px rgba(204,17,34,0.35);
  transition: all .15s;
  position: relative;
  overflow: hidden;
}
.comic-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.comic-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 #000, 0 0 30px rgba(204,17,34,0.55);
}
.comic-btn:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 #000;
}

/* ── Camera flash ────────────────────────────────────────── */
.flash-overlay {
  position: fixed; inset: 0;
  background: #fff;
  pointer-events: none;
  z-index: 9999;
  animation: flash-out .45s ease-out forwards;
}
@keyframes flash-out {
  0%   { opacity: 0.9; }
  100% { opacity: 0; }
}

/* ── Screenshot mode (expand grid) ──────────────────────── */
.screenshot-mode .grid-wrap {
  height: auto !important;
  overflow: visible !important;
  max-height: none !important;
}

/* ── Staggered palette entrance ──────────────────────────── */
.act-card { animation: slide-in .3s ease-out both; }
@keyframes slide-in {
  from { opacity:0; transform: translateX(20px); }
  to   { opacity:1; transform: translateX(0); }
}
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="logo">MY<em>DAY</em></div>
    <div class="days" id="dayTabs"></div>
  </div>

  <!-- Main 2-col layout -->
  <div class="main" id="mainContent">

    <!-- Planner panel -->
    <div class="panel" id="plannerPanel">
      <div class="panel-head">
        <div class="panel-head-left">
          <div class="panel-dot"></div>
          <div class="panel-label" id="planLabel">MONDAY — SCHEDULE</div>
        </div>
        <button class="clear-btn" id="clearBtn">CLEAR DAY</button>
      </div>
      <div class="grid-wrap" id="gridWrap">
        <div class="time-grid" id="timeGrid">
          <div id="tLabels"></div>
          <div id="slotsArea">
            <div class="empty-hint" id="emptyHint">
              <span>🗓️</span>
              <p>DRAG ACTIVITIES HERE</p>
            </div>
            <div id="dragGhost"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity palette -->
    <div class="panel palette-panel">
      <div class="panel-head">
        <div class="panel-head-left">
          <div class="panel-dot" style="background:var(--hot);box-shadow:0 0 7px var(--hot)"></div>
          <div class="panel-label">ACTIVITIES</div>
        </div>
      </div>
      <div class="palette-scroll" id="palette"></div>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
      <button class="shot-btn" id="shotBtn">📸&nbsp; SAVE AS IMAGE</button>
      <button class="comic-btn" id="comicBtn">💥&nbsp; CREATE COMIC</button>
    </div>
    <div class="hint-text">drag activities onto the timeline &nbsp;·&nbsp; drag ↕ top edge to shift start &nbsp;·&nbsp; drag ↕ bottom edge to shift end &nbsp;·&nbsp; hover & tap × to delete</div>
  </div>


<!-- Comic preview overlay -->
<div id="comicOverlay" style="display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;overflow-y:auto;background:rgba(7,9,15,0.93);">
  <div style="max-width:1100px;width:100%;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-family:'Bangers',monospace;font-size:22px;letter-spacing:3px;color:#00E5FF;">COMIC PREVIEW</div>
      <div style="display:flex;gap:10px;">
        <button id="comicDownBtn" style="font-family:'Bangers',sans-serif;font-size:18px;letter-spacing:2px;background:#5BE12C;color:#000;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;box-shadow:3px 3px 0 #000;">⬇ DOWNLOAD</button>
        <button id="comicCloseBtn" style="font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;background:#CC1122;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;box-shadow:3px 3px 0 #000;">✕ CLOSE</button>
      </div>
    </div>
    <img id="comicPreviewImg" src="" alt="" style="max-width:100%;border:4px solid #000;box-shadow:8px 8px 0 #000;border-radius:4px;display:block;">
  </div>
</div>
</div><!-- #app -->

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const SLOT_H    = 26;   // px per 30-min slot (must match --slot-h)
const N_SLOTS   = 32;   // 6:00 AM → 10:00 PM
const START_H   = 6;    // 6 AM

const DAYS_SHORT = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAYS_FULL  = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// JS getDay(): 0=Sun … 6=Sat → convert to Mon=0…Sun=6
const todayJsDay = new Date().getDay();
const todayIdx   = (todayJsDay + 6) % 7;

const ACTS = [
  { id:'school',   name:'School',        icon:'🏫', color:'#3399FF' },
  { id:'eating',   name:'Eating',        icon:'🍕', color:'#FF6B35' },
  { id:'homework', name:'Homework',      icon:'📝', color:'#FFD600' },
  { id:'studying', name:'Studying',      icon:'📚', color:'#00E5B0' },
  { id:'gaming',   name:'Gaming',        icon:'🎮', color:'#FF2D78' },
  { id:'bag',      name:'School Bag',    icon:'🎒', color:'#7EC8E3' },
  { id:'sleep',    name:'Sleep',         icon:'😴', color:'#9B6DFF' },
  { id:'chilling', name:'Chilling',      icon:'😎', color:'#00CC88' },
  { id:'soccer',   name:'Soccer',        icon:'⚽', color:'#5BE12C' },
  { id:'friends',  name:'Friends',       icon:'👥', color:'#FFAA22' },
  { id:'doctor',   name:'Doctor',        icon:'🩺', color:'#FF4D6D' },
  { id:'shower',   name:'Shower',        icon:'🚿', color:'#48CAE4' },
  { id:'sports',   name:'Sports',        icon:'🏃', color:'#FF8C00' },
];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
// schedule[dayIdx] = [ { id, activityId, startSlot, numSlots }, … ]
const schedule = Array.from({length:7}, ()=>[]);
let currentDay = todayIdx;
let blockId    = 0;

// Drag
let dragActId   = null;   // which activity is being dragged in
let ghostSlot   = -1;

// Resize (bottom edge — adjusts end time)
let rsState = null; // { id, startY, origSlots, startSlot }

// Resize (top edge — adjusts start time, keeping end time fixed)
let rsTopState = null; // { id, startY, origStartSlot, origNumSlots }

/* ═══════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════ */
function slotToTime(slot) {
  const mins = START_H * 60 + slot * 30;
  const h24  = Math.floor(mins / 60) % 24;
  const m    = mins % 60;
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  const h12  = h24 % 12 || 12;
  return `${h12}:${m.toString().padStart(2,'0')} ${ampm}`;
}

function getAct(id) { return ACTS.find(a => a.id === id); }

function lightenHex(hex, pct) {
  // pct 0–1, returns a slightly lighter version for gradient
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const mix = v => Math.min(255, Math.round(v + (255-v)*pct));
  return `rgb(${mix(r)},${mix(g)},${mix(b)})`;
}

function armCol(hex){
  // Returns a 30% darker shade for sleeves — visually separates arms from torso
  try {
    const r=parseInt(hex.slice(1,3),16);
    const g=parseInt(hex.slice(3,5),16);
    const b=parseInt(hex.slice(5,7),16);
    const d=v=>Math.max(0,Math.round(v*0.68));
    return `rgb(${d(r)},${d(g)},${d(b)})`;
  } catch(e){ return hex; }
}

/* ═══════════════════════════════════════════════════════
   DAY TABS
═══════════════════════════════════════════════════════ */
function buildDayTabs() {
  const el = document.getElementById('dayTabs');
  DAYS_SHORT.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (i === currentDay ? ' active' : '');
    btn.textContent = d;
    if (i === todayIdx) {
      const dot = document.createElement('span');
      dot.className = 'today-dot';
      btn.appendChild(dot);
    }
    btn.addEventListener('click', () => switchDay(i));
    el.appendChild(btn);
  });
}

function switchDay(idx) {
  currentDay = idx;
  document.querySelectorAll('.day-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
  document.getElementById('planLabel').textContent = `${DAYS_FULL[idx].toUpperCase()} — SCHEDULE`;
  renderBlocks();
}

/* ═══════════════════════════════════════════════════════
   TIME GRID BUILD
═══════════════════════════════════════════════════════ */
function buildGrid() {
  const labelsEl = document.getElementById('tLabels');
  const slotsEl  = document.getElementById('slotsArea');
  // Set the slotsArea total height explicitly so absolute children work
  slotsEl.style.height = `${N_SLOTS * SLOT_H}px`;

  for (let i = 0; i < N_SLOTS; i++) {
    // Label
    const lbl = document.createElement('div');
    const isHour = (i % 2 === 0);
    const isNoon = (i === 12);
    lbl.className = 't-label' + (isHour ? ' full-hour' : '') + (isNoon ? ' noon' : '');
    lbl.textContent = isHour ? slotToTime(i) : '';
    labelsEl.appendChild(lbl);

    // Slot row
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.dataset.slot = i;
    slotsEl.insertBefore(row, document.getElementById('dragGhost'));
  }

  // Hour lines — absolutely positioned ON TOP of blocks so always visible
  for (let i = 0; i < N_SLOTS; i++) {
    if (i % 2 !== 0) continue; // full hours only
    const line = document.createElement('div');
    line.className = 'hour-line' + (i === 12 ? ' noon' : '');
    line.style.top = `${i * SLOT_H}px`;
    slotsEl.appendChild(line);
  }

  // Attach drag events to the entire slotsArea
  slotsEl.addEventListener('dragover', onSlotsDragOver);
  slotsEl.addEventListener('dragleave', onSlotsDragLeave);
  slotsEl.addEventListener('drop', onSlotsDrop);
}

/* ═══════════════════════════════════════════════════════
   PALETTE BUILD
═══════════════════════════════════════════════════════ */
function buildPalette() {
  const el = document.getElementById('palette');
  ACTS.forEach((act, i) => {
    const card = document.createElement('div');
    card.className = 'act-card';
    card.draggable = true;
    card.style.color = act.color;
    card.style.animationDelay = `${i * 0.04}s`;

    const swatch = document.createElement('div');
    swatch.className = 'act-swatch';
    swatch.style.background = act.color;
    swatch.style.boxShadow = `0 0 6px ${act.color}66`;

    const emoji = document.createElement('span');
    emoji.className = 'act-emoji';
    emoji.textContent = act.icon;

    const name = document.createElement('span');
    name.className = 'act-name';
    name.textContent = act.name;

    card.appendChild(swatch);
    card.appendChild(emoji);
    card.appendChild(name);

    card.addEventListener('dragstart', (e) => {
      dragActId = act.id;
      e.dataTransfer.setData('text/plain', act.id);
      e.dataTransfer.effectAllowed = 'copy';
      card.classList.add('is-dragging');
      setTimeout(() => showGhost(0), 0);
    });
    card.addEventListener('dragend', () => {
      dragActId = null;
      card.classList.remove('is-dragging');
      hideGhost();
    });

    el.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════════════
   DRAG GHOST
═══════════════════════════════════════════════════════ */
function slotFromEvent(e) {
  const slotsEl = document.getElementById('slotsArea');
  const rect    = slotsEl.getBoundingClientRect();
  const y       = e.clientY - rect.top;
  return Math.max(0, Math.min(N_SLOTS - 1, Math.floor(y / SLOT_H)));
}

function showGhost(slot) {
  const ghost = document.getElementById('dragGhost');
  ghost.style.display = 'block';
  ghost.style.top     = `${slot * SLOT_H}px`;
  ghostSlot = slot;
}

function hideGhost() {
  document.getElementById('dragGhost').style.display = 'none';
  ghostSlot = -1;
}

/* ═══════════════════════════════════════════════════════
   DRAG OVER / DROP
═══════════════════════════════════════════════════════ */
function onSlotsDragOver(e) {
  if (!dragActId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  const slot = slotFromEvent(e);
  if (slot !== ghostSlot) showGhost(slot);
}

function onSlotsDragLeave(e) {
  // Only hide if leaving the slotsArea entirely
  const slotsEl = document.getElementById('slotsArea');
  if (!slotsEl.contains(e.relatedTarget)) hideGhost();
}

function onSlotsDrop(e) {
  e.preventDefault();
  const actId = dragActId || e.dataTransfer.getData('text/plain');
  if (!actId) { hideGhost(); return; }
  const slot = slotFromEvent(e);
  addBlock(actId, slot);
  dragActId = null;
  hideGhost();
}

/* ═══════════════════════════════════════════════════════
   BLOCK CRUD
═══════════════════════════════════════════════════════ */
function addBlock(actId, startSlot) {
  const id = ++blockId;
  // Default 2 slots (1 hr), clamped so it fits
  const numSlots = Math.min(2, N_SLOTS - startSlot);
  schedule[currentDay].push({ id, actId, startSlot, numSlots });
  renderBlocks();
}

function removeBlock(id) {
  schedule[currentDay] = schedule[currentDay].filter(b => b.id !== id);
  renderBlocks();
}

function clearDay() {
  schedule[currentDay] = [];
  renderBlocks();
}

/* ═══════════════════════════════════════════════════════
   RENDER BLOCKS
═══════════════════════════════════════════════════════ */
function renderBlocks() {
  const slotsEl = document.getElementById('slotsArea');
  // Remove existing blocks
  slotsEl.querySelectorAll('.placed-block').forEach(el => el.remove());

  const dayBlocks = schedule[currentDay];
  document.getElementById('emptyHint').style.opacity = dayBlocks.length ? '0' : '0.28';

  dayBlocks.forEach(blk => {
    const act = getAct(blk.actId);
    if (!act) return;

    const el = document.createElement('div');
    el.className = 'placed-block';
    el.dataset.blockId = blk.id;

    const top = blk.startSlot * SLOT_H;
    const h   = blk.numSlots  * SLOT_H - 2;
    el.style.top    = `${top}px`;
    el.style.height = `${h}px`;
    el.style.background = `linear-gradient(150deg, ${act.color} 0%, ${lightenHex(act.color, 0.15)} 100%)`;
    el.style.borderColor = `rgba(255,255,255,0.18)`;
    el.style.boxShadow   = `0 3px 14px ${act.color}44, inset 0 1px 0 rgba(255,255,255,0.15)`;

    // Top row: icon + name always side by side
    const topRow = document.createElement('div');
    topRow.className = 'blk-top';

    const iconEl = document.createElement('span');
    iconEl.className = 'blk-icon';
    iconEl.textContent = act.icon;

    const nameEl = document.createElement('span');
    nameEl.className = 'blk-name';
    nameEl.textContent = act.name;

    topRow.appendChild(iconEl);
    topRow.appendChild(nameEl);

    // Time label — shows the actual start time of this block
    // (the .blk-time CSS class was defined but never wired up — this is the fix)
    const timeEl = document.createElement('div');
    timeEl.className = 'blk-time';
    const endSlot = blk.startSlot + blk.numSlots;
    timeEl.textContent = slotToTime(blk.startSlot) + ' – ' + slotToTime(endSlot);

    // Delete button
    const delBtn = document.createElement('div');
    delBtn.className = 'blk-del';
    delBtn.innerHTML = '&times;';
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); removeBlock(blk.id); });

    // Top resize handle (drag to change start time, end stays fixed)
    const rsTopHnd = document.createElement('div');
    rsTopHnd.className = 'blk-resize-top';
    rsTopHnd.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      startResizeTop(blk.id, e.clientY, blk.startSlot, blk.numSlots);
    });

    // Bottom resize handle (drag to change end time, start stays fixed)
    const rsHnd = document.createElement('div');
    rsHnd.className = 'blk-resize';
    rsHnd.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      startResize(blk.id, e.clientY, blk.numSlots, blk.startSlot);
    });

    el.appendChild(rsTopHnd);
    el.appendChild(topRow);
    el.appendChild(timeEl);
    el.appendChild(delBtn);
    el.appendChild(rsHnd);

    slotsEl.appendChild(el);
  });
}

/* ═══════════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════════ */
function startResize(id, startY, origSlots, startSlot) {
  rsState = { id, startY, origSlots, startSlot };
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onResizeMove);
  document.addEventListener('mouseup',   onResizeEnd);
}

function onResizeMove(e) {
  if (!rsState) return;
  const delta     = e.clientY - rsState.startY;
  const deltaSlots= Math.round(delta / SLOT_H);
  const newSlots  = Math.max(1, Math.min(N_SLOTS - rsState.startSlot, rsState.origSlots + deltaSlots));
  const blk = schedule[currentDay].find(b => b.id === rsState.id);
  if (blk && blk.numSlots !== newSlots) {
    blk.numSlots = newSlots;
    renderBlocks();
  }
}

function onResizeEnd() {
  rsState = null;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup',   onResizeEnd);
}

/* ── Top-edge resize: drag to shift start time (end time stays fixed) ── */
function startResizeTop(id, startY, origStartSlot, origNumSlots) {
  rsTopState = { id, startY, origStartSlot, origNumSlots };
  document.body.style.cursor = 'ns-resize';
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onResizeTopMove);
  document.addEventListener('mouseup',   onResizeTopEnd);
}

function onResizeTopMove(e) {
  if (!rsTopState) return;
  const delta      = e.clientY - rsTopState.startY;
  const deltaSlots = Math.round(delta / SLOT_H);
  // End slot stays fixed; moving top up/down shrinks/grows the block
  const endSlot    = rsTopState.origStartSlot + rsTopState.origNumSlots;
  const newStart   = Math.max(0, Math.min(endSlot - 1, rsTopState.origStartSlot + deltaSlots));
  const newSlots   = Math.max(1, endSlot - newStart);
  const blk = schedule[currentDay].find(b => b.id === rsTopState.id);
  if (blk && (blk.startSlot !== newStart || blk.numSlots !== newSlots)) {
    blk.startSlot = newStart;
    blk.numSlots  = newSlots;
    renderBlocks();
  }
}

function onResizeTopEnd() {
  rsTopState = null;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  document.removeEventListener('mousemove', onResizeTopMove);
  document.removeEventListener('mouseup',   onResizeTopEnd);
}

/* ═══════════════════════════════════════════════════════
   SCREENSHOT
═══════════════════════════════════════════════════════ */
document.getElementById('shotBtn').addEventListener('click', async () => {
  const wrap       = document.getElementById('gridWrap');
  const origH      = wrap.style.height;
  const origOvf    = wrap.style.overflow;
  const origMaxH   = wrap.style.maxHeight;

  // Expand grid to full height
  wrap.style.height    = `${N_SLOTS * SLOT_H + 4}px`;
  wrap.style.overflow  = 'visible';
  wrap.style.maxHeight = 'none';
  wrap.scrollTop = 0;

  // Wait a frame for layout
  await new Promise(r => setTimeout(r, 120));

  try {
    const canvas = await html2canvas(document.getElementById('app'), {
      backgroundColor: '#07090F',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      ignoreElements: (el) => el.classList && el.classList.contains('bottom-bar'),
      windowWidth: document.documentElement.scrollWidth,
      windowHeight: document.documentElement.scrollHeight,
    });

    // Restore
    wrap.style.height    = origH;
    wrap.style.overflow  = origOvf;
    wrap.style.maxHeight = origMaxH;

    // Flash effect
    const fl = document.createElement('div');
    fl.className = 'flash-overlay';
    document.body.appendChild(fl);
    fl.addEventListener('animationend', () => fl.remove());

    // Download
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = `myday-${DAYS_SHORT[currentDay].toLowerCase()}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 'image/png');

  } catch(err) {
    // Restore on error
    wrap.style.height    = origH;
    wrap.style.overflow  = origOvf;
    wrap.style.maxHeight = origMaxH;
    alert('Screenshot failed: ' + err.message);
  }
});

function buildFaceSVG(exp){
  return FACE_SVGS[exp] || FACE_SVGS.happy;
}

/* Pre-load all 6 expression images at startup.
   Using data URIs keeps everything in one self-contained file. */
const _FI = {};
(function(){
  ['happy','excited','concentrate','sleep','smug','neutral'].forEach(e=>{
    const img = new Image();
    img.src = 'data:image/svg+xml;charset=utf-8,'
             + encodeURIComponent(buildFaceSVG(e));
    _FI[e] = img;
  });
})();

/* ── drawFaceW: replaces the old canvas-drawing face function ─ */
/* Scale factor: face oval height = 64 SVG units → 2r canvas px */
function drawFaceW(ctx, cx, cy, r, exp){
  exp = (_FI[exp]) ? exp : 'happy';
  const img = _FI[exp];
  if(!img || !img.complete || !img.naturalWidth) return;
  const s = r / 32;          /* 32 = half of face-oval height in SVG */
  ctx.drawImage(img, cx-50*s, cy-58*s, 100*s, 120*s);
}



/* ── Core helpers (kept from v1) ─────────────────────────── */
function rrect(ctx,x,y,w,h,r){
  r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function fs(ctx,fc,sc,lw){ ctx.fillStyle=fc; ctx.fill(); ctx.strokeStyle=sc||OLC; ctx.lineWidth=lw||LW; ctx.stroke(); }

// Tapered limb: filled rounded shape between two points, r1/r2 = half-width at each end
function drawLimb(ctx,x1,y1,x2,y2,r1,r2,col){
  const dx=x2-x1, dy=y2-y1;
  const len=Math.sqrt(dx*dx+dy*dy); if(len<1) return;
  const ux=dx/len, uy=dy/len, px=-uy, py=ux;
  ctx.beginPath();
  ctx.moveTo(x1+px*r1, y1+py*r1);
  ctx.lineTo(x2+px*r2, y2+py*r2);
  ctx.arc(x2,y2,r2,Math.atan2(py,px),Math.atan2(-py,-px),false);
  ctx.lineTo(x1-px*r1, y1-py*r1);
  ctx.arc(x1,y1,r1,Math.atan2(-py,-px),Math.atan2(py,px),true);
  ctx.closePath();
  ctx.fillStyle=col; ctx.fill();
  // Only outline leg segments (pants colour) — arms merge seamlessly into pullover
  if(col===PT){ ctx.strokeStyle=OLC; ctx.lineWidth=LW; ctx.stroke(); }
}

// Halftone dots clipped to a rect
function cHalftone(ctx,x,y,w,h,sp,col){
  ctx.save();
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.fillStyle=col;
  for(let gx=x+sp/2;gx<x+w;gx+=sp)
    for(let gy=y+sp/2;gy<y+h;gy+=sp){
      ctx.beginPath(); ctx.arc(gx,gy,sp*0.26,0,Math.PI*2); ctx.fill();
    }
  ctx.restore();
}

// Time stamp — clean DM Mono, no playful fonts
function cTimeStamp(ctx,x,y,t){
  ctx.save();
  ctx.font='bold 13px "DM Mono",monospace';
  const tw=ctx.measureText(t).width, bw=tw+16, bh=22;
  ctx.fillStyle='#111'; ctx.fillRect(x,y,bw,bh);
  ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(t,x+8,y+bh/2);
  ctx.restore();
}

function textWrap(ctx,text,maxW){
  const words=text.split(' '), lines=[]; let line='';
  for(const w of words){
    const t=line?line+' '+w:w;
    if(ctx.measureText(t).width>maxW&&line){ lines.push(line); line=w; } else line=t;
  }
  if(line) lines.push(line); return lines;
}

function cBubble(ctx,bx,by,bw,text){
  ctx.save();
  ctx.font='bold 26px Bangers,Impact,sans-serif';
  const lines=textWrap(ctx,text,bw-28), lh=32, bh=lines.length*lh+28, br=24;
  ctx.fillStyle='rgba(0,0,0,0.18)'; rrect(ctx,bx+4,by+4,bw,bh,br); ctx.fill();
  ctx.fillStyle='#fff'; rrect(ctx,bx,by,bw,bh,br); ctx.fill();
  ctx.strokeStyle=OLC; ctx.lineWidth=3.5; ctx.stroke();
  const tx=bx+bw*0.3;
  ctx.beginPath(); ctx.moveTo(tx-13,by+bh); ctx.lineTo(tx,by+bh+24); ctx.lineTo(tx+13,by+bh);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle=OLC; ctx.lineWidth=3.5; ctx.stroke();
  ctx.fillStyle='#fff'; ctx.fillRect(tx-11,by+bh-4,24,7);
  ctx.fillStyle='#1a1a1a'; ctx.textAlign='center'; ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,bx+bw/2,by+13+i*lh));
  ctx.restore();
}

function cSFX(ctx,x,y,text,col,ang){
  ctx.save();
  ctx.translate(x,y); ctx.rotate(ang||-0.15);
  // Starburst — 12-point star
  ctx.beginPath();
  for(let i=0;i<24;i++){
    const a=i*Math.PI/12, r=i%2===0?46:28;
    if(i===0) ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fillStyle='#FFF176'; ctx.fill();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5; ctx.stroke();
  // Text
  ctx.font='bold 30px Bangers,Impact,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.strokeStyle='#000'; ctx.lineWidth=6; ctx.strokeText(text,0,0);
  ctx.fillStyle=col; ctx.fillText(text,0,0);
  ctx.restore();
}

/* ── Body helpers ─────────────────────────────────────────── */
// Trapezoid torso: wider at shoulders (top), narrower at waist (bottom)
function drawTorso(ctx,cx,cy,col){
  ctx.beginPath();
  ctx.moveTo(cx-27,cy-58); ctx.lineTo(cx+27,cy-58); // shoulder line
  ctx.quadraticCurveTo(cx+30,cy-34,cx+21,cy+2);     // right side with slight inward curve
  ctx.lineTo(cx-21,cy+2);                            // waist bottom
  ctx.quadraticCurveTo(cx-30,cy-34,cx-27,cy-58);    // left side
  ctx.closePath();
  ctx.fillStyle=col; ctx.fill(); // no outline — pullover looks seamless
}

// Neck
function drawNeck(ctx,cx,cy){
  rrect(ctx,cx-6,cy-66,12,12,4); fs(ctx,SK);
}

// Shoe (ellipse at foot position)
function drawShoe(ctx,x,y,flip){
  ctx.save(); ctx.translate(x,y);
  if(flip) ctx.scale(-1,1);
  ctx.beginPath();
  ctx.ellipse(4,0,16,7,0,0,Math.PI*2); fs(ctx,SH);
  ctx.restore();
}

/* ══ 13 FIGURE FUNCTIONS ══════════════════════════════════ */
// All use (ctx, cx, cy, col) where cy = waist level

// ── Standard standing pose ────────────────────────────────
function drawStandKid(ctx,cx,cy,col,exp){
  const ac=armCol(col);
  // Back arm (right) drawn first (behind torso when leaning)
  drawLimb(ctx,cx+24,cy-54, cx+36,cy-26, 12,10,ac);
  drawLimb(ctx,cx+36,cy-26, cx+30,cy-2,  10,8, ac);
  ctx.beginPath(); ctx.arc(cx+30,cy-2,9,0,Math.PI*2); fs(ctx,SK);
  // Legs
  drawLimb(ctx,cx-14,cy+10, cx-16,cy+42, 14,12,PT);
  drawLimb(ctx,cx-16,cy+42, cx-15,cy+72, 12,10,PT);
  drawShoe(ctx,cx-18,cy+78,false);
  drawLimb(ctx,cx+14,cy+10, cx+16,cy+42, 14,12,PT);
  drawLimb(ctx,cx+16,cy+42, cx+15,cy+72, 12,10,PT);
  drawShoe(ctx,cx+18,cy+78,true);
  // Torso + neck
  drawTorso(ctx,cx,cy,col);
  drawNeck(ctx,cx,cy);
  // Front arm (left) on top of torso
  drawLimb(ctx,cx-24,cy-54, cx-36,cy-26, 12,10,ac);
  drawLimb(ctx,cx-36,cy-26, cx-30,cy-2,  10,8, ac);
  ctx.beginPath(); ctx.arc(cx-30,cy-2,9,0,Math.PI*2); fs(ctx,SK);
  // Head
  drawFaceW(ctx,cx,cy-90,27,exp||'happy');
}

// ── SCHOOL ────────────────────────────────────────────────
function figSchool(ctx,cx,cy,col){
  // Scene: building silhouette in background
  ctx.fillStyle='rgba(200,210,255,0.25)';
  ctx.fillRect(cx+60,cy-130,80,110);
  ctx.fillStyle='rgba(150,160,200,0.3)';
  ctx.fillRect(cx+68,cy-110,18,28); ctx.fillRect(cx+94,cy-110,18,28); // windows
  ctx.fillStyle='rgba(150,160,200,0.3)';
  ctx.beginPath(); ctx.moveTo(cx+60,cy-130); ctx.lineTo(cx+100,cy-155); ctx.lineTo(cx+140,cy-130); ctx.fill();
  // flag pole
  ctx.strokeStyle='rgba(100,110,150,0.4)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx+100,cy-155); ctx.lineTo(cx+100,cy-175); ctx.stroke();
  ctx.fillStyle='rgba(200,50,50,0.4)';
  ctx.fillRect(cx+100,cy-175,14,10);
  // Ground line
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-80,cy+72); ctx.lineTo(cx+160,cy+72); ctx.stroke();

  // ── Four background chairs (in perspective, behind the figures) ──
  [cx-68,cx-38,cx-8,cx+22].forEach((chx,i)=>{
    const chCol='rgba(120,90,50,0.45)', chDark='rgba(80,55,25,0.5)';

/* ── Tiny background character (for school/friends/sports panels) ── */
function drawTinyKid(ctx,cx,cy,sc,shirtCol){
  sc=sc||0.4;
  ctx.save(); ctx.translate(cx,cy);
  const r=9*sc;
  // Body
  ctx.fillStyle=shirtCol||'#3399FF';
  ctx.beginPath(); ctx.rect(-8*sc,-34*sc,16*sc,26*sc); ctx.fill();
  ctx.strokeStyle=OLC; ctx.lineWidth=1; ctx.stroke();
  // Pants
  ctx.fillStyle=PT;
  ctx.beginPath(); ctx.rect(-9*sc,-9*sc,8*sc,26*sc); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.rect(1*sc,-9*sc,8*sc,26*sc); ctx.fill(); ctx.stroke();
  // Arms
  ctx.fillStyle=shirtCol||'#3399FF';
  ctx.beginPath(); ctx.rect(-16*sc,-32*sc,8*sc,18*sc); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.rect(8*sc,-32*sc,8*sc,18*sc); ctx.fill(); ctx.stroke();
  // Head
  ctx.fillStyle=SK;
  ctx.beginPath(); ctx.ellipse(0,-42*sc,r*0.9,r,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=OLC; ctx.lineWidth=1; ctx.stroke();
  // Hair
  ctx.fillStyle=HR;
  ctx.beginPath(); ctx.ellipse(0,-47*sc,r*0.9,r*0.5,0,Math.PI,Math.PI*2); ctx.fill();
  // Eyes (dots)
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath(); ctx.arc(-4*sc,-42*sc,1.4*sc,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4*sc,-42*sc,1.4*sc,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

  ctx.beginPath(); ctx.moveTo(px,py+ph*0.62); ctx.lineTo(px+pw,py+ph*0.62); ctx.stroke();
  // Distant treeline silhouette at horizon
  const treeLine = py+ph*0.62;
  ctx.fillStyle='#1E5C08';
  for(let ti=0;ti<8;ti++){
    const tx=px+ti*(pw/8)+pw*0.02;
    const th=28+[18,24,14,20,16,22,12,26][ti];
    ctx.beginPath();
    ctx.arc(tx,treeLine-th*0.55,th*0.32,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(tx-th*0.18,treeLine-th*0.38,th*0.24,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc(tx+th*0.18,treeLine-th*0.38,th*0.24,0,Math.PI*2); ctx.fill();
    ctx.fillRect(tx-3,treeLine-th*0.28,6,th*0.28);
  }
  // Clouds
  ctx.fillStyle='rgba(255,255,255,0.88)';
  function cloud(ccx,ccy,s){ctx.beginPath();ctx.arc(ccx,ccy,s*1.2,0,Math.PI*2);ctx.arc(ccx+s*1.6,ccy-s*0.3,s,0,Math.PI*2);ctx.arc(ccx+s*2.9,ccy,s*1.1,0,Math.PI*2);ctx.fill();}
  cloud(px+55,py+28,13); cloud(px+pw*0.58,py+20,15);
  // Soccer goal post
  ctx.strokeStyle='rgba(240,240,240,0.92)'; ctx.lineWidth=4; ctx.lineCap='square';
  ctx.beginPath();
  ctx.moveTo(px+pw*0.74,py+ph*0.62); ctx.lineTo(px+pw*0.74,py+ph*0.33);
  ctx.lineTo(px+pw*0.95,py+ph*0.33); ctx.lineTo(px+pw*0.95,py+ph*0.62);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=0.8;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(px+pw*0.74+i*(pw*0.21/4),py+ph*0.33);ctx.lineTo(px+pw*0.74+i*(pw*0.21/4),py+ph*0.62);ctx.stroke();}
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(px+pw*0.74,py+ph*0.33+i*(ph*0.29/4));ctx.lineTo(px+pw*0.95,py+ph*0.33+i*(ph*0.29/4));ctx.stroke();}
  // Field marking
  ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(px+pw*0.3,py+ph*0.75,28,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px+pw*0.3,py+ph*0.62); ctx.lineTo(px+pw*0.3,py+ph); ctx.stroke();
}

function bgBathroom(ctx,px,py,pw,ph){
  ctx.fillStyle='#E0EEFF'; ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#BCC8DC'; ctx.lineWidth=0.7;
  for(let ty=py;ty<py+ph;ty+=26) for(let tx=px;tx<px+pw;tx+=26) ctx.strokeRect(tx,ty,26,26);
  ctx.fillStyle='#C8D8E8'; ctx.fillRect(px,py+ph*0.7,pw,ph*0.3);
  ctx.strokeStyle='#A8B8C8'; ctx.lineWidth=0.7;
  for(let tx=px;tx<px+pw;tx+=20){ctx.beginPath();ctx.moveTo(tx,py+ph*0.7);ctx.lineTo(tx,py+ph);ctx.stroke();}
  ctx.beginPath();ctx.moveTo(px,py+ph*0.82);ctx.lineTo(px+pw,py+ph*0.82);ctx.stroke();
  // Shower curtain (right)
  ctx.fillStyle='#A8C8E8'; ctx.fillRect(px+pw*0.6,py,pw*0.4,ph*0.72);
  ctx.strokeStyle='#5888B8'; ctx.lineWidth=2.5; ctx.strokeRect(px+pw*0.6,py,pw*0.4,ph*0.72);
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=3;
  for(let s=0;s<4;s++){ctx.beginPath();ctx.moveTo(px+pw*0.62+s*22,py);ctx.lineTo(px+pw*0.62+s*22,py+ph*0.72);ctx.stroke();}
  ctx.strokeStyle='#888'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(px+pw*0.58,py+8); ctx.lineTo(px+pw,py+8); ctx.stroke();
  // Rings on rod
  ctx.fillStyle='#AAA';
  for(let rg=0;rg<5;rg++){ctx.beginPath();ctx.arc(px+pw*0.62+rg*18,py+8,4,0,Math.PI*2);ctx.fill();}
  // Steam
  ctx.fillStyle='rgba(200,220,255,0.2)';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(px+pw*0.44+i*12,py+ph*0.32+i*7,7,14,0.3,0,Math.PI*2);ctx.fill();}
  // Mirror (left)
  ctx.fillStyle='#C8E4F4'; ctx.fillRect(px+8,py+10,pw*0.32,ph*0.42);
  ctx.strokeStyle='#7788AA'; ctx.lineWidth=2; ctx.strokeRect(px+8,py+10,pw*0.32,ph*0.42);
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.fillRect(px+10,py+12,pw*0.08,ph*0.38);
}

function bgDoctor(ctx,px,py,pw,ph){

  ctx.fillRect(px+pw*0.14,py+ph*0.24,pw*0.12,pw*0.04);
  ctx.fillRect(px+pw*0.18,py+ph*0.2,pw*0.04,pw*0.12);

  ctx.fillStyle='#C4E0F4'; ctx.fillRect(px+pw*0.5,py+10,pw*0.42,ph*0.32);

  ctx.strokeStyle='#B22'; ctx.lineWidth=1.5; ctx.strokeRect(px+pw*0.08,py+ph*0.46,22,ph*0.12);
  ctx.strokeStyle='#FFDD00'; ctx.lineWidth=2; ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(px+pw*0.1,py+ph*0.42);ctx.lineTo(px+pw*0.11,py+ph*0.47);ctx.stroke();
  ctx.beginPath();ctx.moveTo(px+pw*0.14,py+ph*0.4);ctx.lineTo(px+pw*0.14,py+ph*0.47);ctx.stroke();

function bgEating(ctx,px,py,pw,ph){

function bgSports(ctx,px,py,pw,ph){
  // ── Indoor gym ───────────────────────────────────────────
  // Floor: rubber mat, dark grey
  ctx.fillStyle='#2A2A2A'; ctx.fillRect(px,py,pw,ph);
  // Back wall: warm mid-grey
  ctx.fillStyle='#3C3C3C'; ctx.fillRect(px,py,pw,ph*0.72);
  // Rubber floor strip
  ctx.fillStyle='#1E1E1E'; ctx.fillRect(px,py+ph*0.72,pw,ph*0.28);
  // Floor lane lines
  ctx.strokeStyle='rgba(255,200,0,0.35)'; ctx.lineWidth=2; ctx.setLineDash([]);
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(px,py+ph*0.74+i*8); ctx.lineTo(px+pw,py+ph*0.74+i*8); ctx.stroke();
  }
  // Mirror wall (left side panel)
  const mx=px+4, mw=pw*0.18, mh=ph*0.60;
  ctx.fillStyle='rgba(180,220,240,0.12)'; ctx.fillRect(mx,py+6,mw,mh);
  ctx.strokeStyle='rgba(180,220,240,0.5)'; ctx.lineWidth=2.5; ctx.strokeRect(mx,py+6,mw,mh);
  // Reflection shimmer lines on mirror
  ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(mx+8+i*10,py+12); ctx.lineTo(mx+4+i*10,py+mh-8); ctx.stroke();
  }
  // Weight rack (right side)
  const rx=px+pw*0.74, ry=py+ph*0.55, rw=pw*0.22, rh=ph*0.17;
  ctx.fillStyle='#222'; ctx.fillRect(rx,ry,rw,rh);
  ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.strokeRect(rx,ry,rw,rh);
  // Rack poles
  ctx.strokeStyle='#444'; ctx.lineWidth=3;
  [0.2,0.5,0.8].forEach(f=>{
    ctx.beginPath(); ctx.moveTo(rx+rw*f,ry); ctx.lineTo(rx+rw*f,ry+rh); ctx.stroke();
  });
  // Weights on rack — pairs of dumbbells
  const wCols=['#CC2200','#0055CC','#338800'];
  [0,1,2].forEach(i=>{
    const wx=rx+rw*([0.2,0.5,0.8][i])-8, wy=ry+6;
    ctx.fillStyle=wCols[i];
    ctx.beginPath(); ctx.ellipse(wx,wy+10,7,12,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#888'; ctx.fillRect(wx-2,wy,4,20);
    ctx.fillStyle=wCols[i];
    ctx.beginPath(); ctx.ellipse(wx+16,wy+10,7,12,0,0,Math.PI*2); ctx.fill();
  });
  // Motivational poster on wall (top-right)
  const bx=px+pw*0.72, by2=py+10, bw2=pw*0.24, bh2=ph*0.18;
  ctx.fillStyle='#111'; ctx.fillRect(bx,by2,bw2,bh2);
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2.5; ctx.strokeRect(bx+3,by2+3,bw2-6,bh2-6);
  ctx.fillStyle='#FFD700'; ctx.font='bold 9px Impact,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('NO PAIN',bx+bw2/2,by2+bh2*0.38);
  ctx.fillText('NO GAIN',bx+bw2/2,by2+bh2*0.65);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

/* ── Background dispatcher ─────────────────────────────── */
function drawBackground(ctx,actId,px,py,pw,ph){
  const BG={
    school:bgClassroom, eating:bgEating, homework:bgHomework, studying:bgStudying,
    gaming:bgGaming, bag:bgBag, sleep:bgSleep, chilling:bgChilling,
    soccer:bgSoccer, friends:bgFriends, doctor:bgDoctor, shower:bgBathroom,
    sports:bgSports,
  };
  const fn=BG[actId];
  if(fn) fn(ctx,px,py,pw,ph);
  else { ctx.fillStyle='#FFFBF0'; ctx.fillRect(px,py,pw,ph); }
}

/* ── Panel renderer (header at top) ──────────────────────── */
function drawComicPanel(ctx,px,py,pw,ph,blk){
  const act=getAct(blk.actId); if(!act) return;
  const meta=COMIC_META[blk.actId]||{sfx:'WOW!',sfxCol:'#FFD600',bubble:act.name+'!',sfxAng:-0.15};
  const HDR=40; // header bar height

  // Hard shadow
  ctx.fillStyle='#000'; ctx.fillRect(px+8,py+8,pw,ph);
  // Panel bg
  ctx.fillStyle='#FFFBF0'; ctx.fillRect(px,py,pw,ph);
  // Halftone
  cHalftone(ctx,px,py+HDR,pw,ph-HDR,10,'rgba(200,140,30,0.055)');

  // ── Header bar ──
  ctx.fillStyle='#1a1a1a'; ctx.fillRect(px,py,pw,HDR);
  // Accent stripe (activity colour)
  ctx.fillStyle=act.color; ctx.fillRect(px,py,5,HDR);
  // Activity name (left)
  ctx.fillStyle='#fff';
  ctx.font='26px Bangers,Impact,sans-serif'; ctx.letterSpacing='2px';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(`${act.icon}  ${act.name.toUpperCase()}`,px+14,py+HDR/2);
  ctx.letterSpacing='0px';
  // Time (right) — clean DM Mono, no playful font
  ctx.font='bold 15px "DM Mono",monospace';
  ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillStyle='#ffffff';
  ctx.fillText(slotToTime(blk.startSlot) + ' – ' + slotToTime(blk.startSlot + blk.numSlots),px+pw-12,py+HDR/2);

  // Panel border: coloured inner accent + black outer border
  ctx.strokeStyle=act.color; ctx.lineWidth=3;
  ctx.globalAlpha=0.55; ctx.strokeRect(px+4,py+4,pw-8,ph-8); ctx.globalAlpha=1;
  ctx.strokeStyle=OLC; ctx.lineWidth=4; ctx.strokeRect(px,py,pw,ph);

  // Figure — clipped to body area below header
  ctx.save();
  ctx.beginPath(); ctx.rect(px+2,py+HDR,pw-4,ph-HDR-2); ctx.clip();
  drawBackground(ctx,blk.actId,px+2,py+HDR,pw-4,ph-HDR-2);
  cHalftone(ctx,px+2,py+HDR,pw-4,ph-HDR-2,8,'rgba(0,0,0,0.035)');
  drawFigure(ctx,blk.actId,px+pw*0.42,py+HDR+(ph-HDR)*0.62,act.color);
  ctx.restore();

  // Speech bubble (top-right of body area)
  const bw=178;
  cBubble(ctx,px+pw-bw-10,py+HDR+8,bw,meta.bubble);

  // SFX (lower-left of body area)
  cSFX(ctx,px+72,py+ph-64,meta.sfx,meta.sfxCol,meta.sfxAng);
}

/* ── Main generate → show overlay ────────────────────────── */
let comicDataURL = null;

function generateComic(){
  const dayBlocks=schedule[currentDay];
  if(!dayBlocks.length){ alert('Add some activities first! 🎨'); return; }
  const entries=[...dayBlocks].sort((a,b)=>a.startSlot-b.startSlot);

  const COLS=2, PAD=52, HEADER_H=104, PW=500, PH=360, GAP=22;
  const rows=Math.ceil(entries.length/COLS);
  const cw=PAD*2+COLS*PW+(COLS-1)*GAP;
  const ch=PAD+HEADER_H+rows*(PH+GAP)+PAD;

  const canvas=document.createElement('canvas');
  canvas.width=cw; canvas.height=ch;
  const ctx=canvas.getContext('2d');

  // Page bg: warm ivory with visible grid texture
  ctx.fillStyle='#FFF8E7'; ctx.fillRect(0,0,cw,ch);
  cHalftone(ctx,0,0,cw,ch,12,'rgba(200,140,30,0.06)');
  // Subtle line texture
  ctx.strokeStyle='rgba(180,120,20,0.04)'; ctx.lineWidth=0.8;
  for(let gy=0;gy<ch;gy+=24){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(cw,gy);ctx.stroke();}

  // Comic title header
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.font='82px Bangers,Impact,sans-serif';
  ctx.fillStyle='#CC1122'; ctx.fillText('MY DAY COMIC',cw/2+4,PAD+72+4);
  ctx.fillStyle='#1a1a1a'; ctx.fillText('MY DAY COMIC',cw/2,PAD+72);
  ctx.font='36px Bangers,Impact,sans-serif';
  ctx.fillStyle='#CC1122'; ctx.fillText(`— ${DAYS_FULL[currentDay].toUpperCase()} —`,cw/2,PAD+102);

  // Panels
  entries.forEach((blk,i)=>{
    const col=i%COLS, row=Math.floor(i/COLS);
    const isLastOdd=(i===entries.length-1)&&(entries.length%2===1);
    const px=isLastOdd?PAD+(PW+GAP)/2:PAD+col*(PW+GAP);
    const py=PAD+HEADER_H+row*(PH+GAP);
    drawComicPanel(ctx,px,py,PW,PH,blk);
  });

  // Show overlay
  comicDataURL = canvas.toDataURL('image/png');
  document.getElementById('comicPreviewImg').src = comicDataURL;
  const overlay = document.getElementById('comicOverlay');
  overlay.style.display = 'flex';
}

/* ── Overlay controls ─────────────────────────────────────── */
document.getElementById('comicCloseBtn').addEventListener('click',()=>{
  document.getElementById('comicOverlay').style.display='none';
});
document.getElementById('comicDownBtn').addEventListener('click',()=>{
  if(!comicDataURL) return;
  const a=document.createElement('a');
  a.href=comicDataURL;
  a.download=`myday-comic-${DAYS_SHORT[currentDay].toLowerCase()}.png`;
  a.click();
});
document.getElementById('comicBtn').addEventListener('click', generateComic);

</script>
